{% set name = "qudida" %}
{% set version = "0.0.4" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/arsenyinfo/{{ name }}/archive/refs/tags/{{ version }}.tar.gz
  sha256: 3f6a7838c3578deec662e63a8cae4ef8d836f6b0d970714be347f868cdcbf232
  
build:
  number: 1
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
  run:
    - numpy >=0.18.0
    - opencv >=4.0.1
    - python >={{ python_min }}
    - scikit-learn >=0.19.1
    - typing-extensions

test:
  requires:
    - python {{ python_min }}
  commands:
    - python -c "import importlib.util; assert importlib.util.find_spec('qudida')"


about:
  home: https://github.com/arsenyinfo/qudida
  summary: QUick and DIrty Domain Adaptation
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - mxr-conda
    - admax18
